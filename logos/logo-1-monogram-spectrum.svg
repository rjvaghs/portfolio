<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 48" fill="none">
  <!-- Monogram: C as ring, H as bar -->
  <circle cx="18" cy="24" r="14" stroke="#facc15" stroke-width="2.5" fill="none"/>
  <path d="M28 10 v28 M28 24 h14 M42 10 v28" stroke="#e5e7eb" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Spectrum bar -->
  <rect x="0" y="42" width="56" height="3" rx="1.5" fill="url(#spectrum1)"/>
  <linearGradient id="spectrum1" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#facc15"/>
    <stop offset="100%" stop-color="#6b7280"/>
  </linearGradient>
  <!-- Wordmark -->
  <text x="62" y="28" font-family="system-ui, sans-serif" font-size="14" font-weight="600" letter-spacing="0.12em" fill="#f4f4f5">CARBONHUE</text>
</svg>
